<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MMO Connect - Feed Global</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="feed-page"> <div class="container feed-container">
        
        <div class="feed-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="margin: 0;">
                <i class="fas fa-globe-americas"></i> EXPLORAR MUNDO
            </h2>
            <a th:href="@{/home-gamer}" class="back-link">
                <i class="fas fa-home"></i> VOLTAR À HOME
            </a>
        </div>

        <div th:each="post : ${posts}" class="post-card">
            
            <div class="post-header">
                <div>
                    <span class="char-name">
                        <i class="fas fa-user-shield"></i> 
                        <span th:text="${post.personagem.nome}">Nome</span>
                    </span>
                    <span class="universo-tag" style="color: #00d4ff; font-size: 0.8rem; margin-left: 10px;">
                        <i class="fas fa-atlas"></i> 
                        <span th:text="${post.personagem.jogo.nome}">Jogo</span>
                    </span>
                </div>
                
                <form th:action="@{/seguir/{id}(id=${post.personagem.id})}" method="post">
                    <button type="submit" class="btn-interaction follow-btn">
                        <i class="fas fa-user-plus"></i> SEGUIR
                    </button>
                </form>
            </div>

            <div class="post-body">
                <p th:text="${post.conteudo}" style="margin: 15px 0; line-height: 1.5; color: #fff;"></p>
                <small style="color: #666; font-size: 0.7rem;">
                    <i class="far fa-clock"></i> 
                    <span th:text="${#temporals.format(post.dataCriacao, 'dd/MM/yyyy HH:mm')}">Data</span>
                </small>
            </div>

            <div class="post-footer">
                
                <form th:action="@{/curtir/{id}(id=${post.id})}" method="post" style="display: inline;">
                    <button type="submit" class="btn-interaction">
                        <i class="fas fa-heart" style="color: #ff4d4d;"></i> 
                        <span th:text="${post.curtidas != null ? post.curtidas.size() : 0}">0</span>
                    </button>
                </form>

                <div class="comment-section">
                    <h6 style="color: #c1a35f; font-size: 0.8rem; margin-bottom: 10px;">
                        <i class="fas fa-comments"></i> COMENTÁRIOS
                    </h6>

                    <div th:each="coment : ${post.comentarios}" class="comment-item">
                        <strong style="color: #00d4ff;" th:text="${coment.personagem.nome}">Autor</strong>
                        <span th:text="${coment.conteudo}">Texto do comentário</span>
                    </div>

                    <form th:action="@{/comentar/{id}(id=${post.id})}" method="post" style="margin-top: 15px;">
                        <div style="display: flex; gap: 8px;">
                            <input type="text" name="conteudo" placeholder="Escreva algo..." 
                                   required style="margin: 0; flex: 1; padding: 8px; font-size: 0.85rem;">
                            <button type="submit" class="btn-interaction" style="width: auto; margin: 0;">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(posts)}" style="text-align: center; color: #666; padding: 50px;">
            <i class="fas fa-ghost fa-3x"></i>
            <p>Nenhuma atividade detectada neste servidor...</p>
        </div>

    </div>
</body>
</html>
