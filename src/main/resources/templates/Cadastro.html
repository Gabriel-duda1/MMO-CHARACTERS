<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MMO Manager - Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-user-plus"></i> NOVO REGISTRO</h2>
        <form th:action="@{/usuario/cadastrar}" method="post">
            <label><i class="fas fa-id-badge"></i> USERNAME</label>
            <input type="text" name="username" placeholder="Nome de exibição" required />
            
            <label><i class="fas fa-envelope"></i> E-MAIL</label>
            <input type="email" name="email" placeholder="email@exemplo.com" required />
            
            <label><i class="fas fa-lock"></i> SENHA</label>
            <input type="password" name="senha" placeholder="Crie uma senha forte" required />
            
            <button type="submit"><i class="fas fa-save"></i> FINALIZAR CADASTRO</button>
        </form>
        <br>
        <a href="/login"><i class="fas fa-arrow-left"></i> VOLTAR PARA LOGIN</a>
    </div>
</body>
</html>
