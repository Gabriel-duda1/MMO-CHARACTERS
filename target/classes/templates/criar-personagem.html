<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MMO Manager - Criar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-magic"></i> NOVO PERSONAGEM</h2>
        <form th:action="@{/personagem/criar}" method="post">
            <label><i class="fas fa-pen"></i> NOME DO PERSONAGEM</label>
            <input type="text" name="nome" placeholder="Nome do herói" required />
            
            <label><i class="fas fa-briefcase"></i> CLASSE</label>
            <select name="classe">
                <option value="Guerreiro">Guerreiro</option>
                <option value="Mago">Mago</option>
                <option value="Arqueiro">Arqueiro</option>
                <option value="Suporte">Suporte</option>
                <option value="Assassino">Assassino</option>
                <option value="Tanque">Tanque</option>
            </select>

            <label><i class="fas fa-globe"></i> JOGO</label>
            <select name="jogo.id" required>
                <option th:each="j : ${jogos}" th:value="${j.id}" th:text="${j.nome}"></option>
            </select>

            <button type="submit"><i class="fas fa-check"></i> CONFIRMAR CRIAÇÃO</button>
        </form>
        <br>
        <a href="/home-gamer"><i class="fas fa-chevron-left"></i> VOLTAR AO PAINEL</a>
    </div>
</body>
</html>
